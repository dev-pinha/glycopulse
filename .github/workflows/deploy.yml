              sudo -u ubuntu git reset --hard origin/master
              sudo -u ubuntu git clean -fd
            fi
            find "$WEB_DIR" -type f -name "index.html" | while read -r htmlfile; do
              dir="$(dirname "$htmlfile")"
              if [ ! -f "$dir/index.php" ]; then
                sudo cp "$htmlfile" "$dir/index.php"
              fi
            done
            cd "$WEB_DIR"
            DEPLOYED_COMMIT=$(sudo -u ubuntu git rev-parse --short HEAD || echo "unknown")
            echo "$(date '+%Y-%m-%d %H:%M:%S') - Deployed commit $DEPLOYED_COMMIT" | sudo tee -a "$LOG_FILE"
            sudo chown -R www-data:www-data "$WEB_DIR"
            sudo chmod -R 755 "$WEB_DIR"
            sudo systemctl restart apache2 || true
            sudo systemctl restart nginx || true
            echo "Deployment finished (Commit: $DEPLOYED_COMMIT)"
